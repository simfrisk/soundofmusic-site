server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    location = /work {
        try_files /work.html =404;
    }

    location = /analog-prophet {
        try_files /analog-prophet.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
}

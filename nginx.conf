server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /404.html;

    # Security headers (applied to all responses)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://soundofmusic.se https://i.scdn.co https://*.scdn.co; frame-src https://open.spotify.com; connect-src 'self'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'self'" always;

    location = /work {
        try_files /work.html =404;
    }

    location = /analog-prophet {
        try_files /analog-prophet.html =404;
    }

    # Long cache for static assets (fingerprinted or stable)
    location ~* \.(jpg|jpeg|png|webp|avif|gif|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Re-assert security headers (add_header does not inherit when set inside location)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # HTML must revalidate so updates ship immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://soundofmusic.se https://i.scdn.co https://*.scdn.co; frame-src https://open.spotify.com; connect-src 'self'; base-uri 'self'; form-action 'self' mailto:; frame-ancestors 'self'" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/plain
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
